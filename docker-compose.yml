# Local development — hot reload enabled via volume mounts

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apni_kirana_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apni_kirana_store"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: dev
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env
    environment:
      # Override .env values to use Docker network service names
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/apni_kirana_store
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run dev"

  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Turbopack dev mode is memory-hungry. Raising Node's heap ceiling
      # to 4GB stops the "approaching memory threshold, restarting" loop
      # we hit during long sessions.
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Skip Next telemetry pings (one fewer thing for dev to do).
      NEXT_TELEMETRY_DISABLED: "1"
      # Keep dev focused — disable the Watchpack file-system polling that
      # spams CPU on macOS/Docker bind-mount layers.
      WATCHPACK_POLLING: "false"
    depends_on:
      - backend
    command: npm run dev
    # Hard-cap container memory at 6GB so a runaway dev server can't
    # eat the laptop. Adjust if you have more headroom.
    deploy:
      resources:
        limits:
          memory: 6G

volumes:
  postgres_data:
  redis_data:
