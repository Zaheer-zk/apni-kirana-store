# =============================================================================
# Admin Dashboard — admin.yourdomain.com
# Proxies to the Next.js admin container on port 3000.
# Static Next.js assets are cached aggressively at the edge.
# No rate limiting — this is an internal operations tool.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name admin.yourdomain.com;

    # Let Certbot verify domain ownership during cert issuance / renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main admin virtual host
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name admin.yourdomain.com;

    # -------------------------------------------------------------------------
    # SSL / TLS
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/admin.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.yourdomain.com/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Common proxy settings
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js uses these for hot-reload websockets in dev; harmless in prod
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # -------------------------------------------------------------------------
    # Next.js static assets — cache forever (filenames are content-hashed)
    # -------------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://admin:3000;

        # Instruct the browser to cache for 1 year and treat as immutable
        expires 1y;
        add_header Cache-Control "public, immutable";

        # No access log noise for static assets
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Everything else — proxy to the Next.js app
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://admin:3000;

        # Increase timeouts for slow server-side renders on first load
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # -------------------------------------------------------------------------
    # Certbot ACME challenge
    # -------------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
