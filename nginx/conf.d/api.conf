# =============================================================================
# API Server — api.yourdomain.com
# Proxies to the backend Node.js/Express container on port 3000.
# Includes WebSocket (Socket.io) support and targeted rate limiting.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name api.yourdomain.com;

    # Let Certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main API virtual host
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # -------------------------------------------------------------------------
    # SSL / TLS
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # Session resumption — reduces handshake overhead for returning clients
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Only allow TLS 1.2 and 1.3; disable older, insecure protocols
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite — prefer server order, exclude weak ciphers
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # HTTP Strict Transport Security — tell browsers to always use HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # -------------------------------------------------------------------------
    # Common proxy settings (applied to all proxy_pass locations below)
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Required for WebSocket / Socket.io upgrade
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # -------------------------------------------------------------------------
    # OTP endpoint — tightest rate limit (5 req/min, burst 3)
    # -------------------------------------------------------------------------
    location /api/v1/auth/send-otp {
        limit_req zone=otp_limit burst=3 nodelay;

        proxy_pass http://backend:3000;
    }

    # -------------------------------------------------------------------------
    # General API — 30 req/min, burst 10
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend:3000;
    }

    # -------------------------------------------------------------------------
    # WebSocket / Socket.io — long-lived connections, no rate limit
    # -------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend:3000;

        # Keep the connection alive for real-time events
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable response buffering so frames are forwarded immediately
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # Health check — no rate limit, used by deploy script & load balancers
    # -------------------------------------------------------------------------
    location /health {
        proxy_pass http://backend:3000;

        # Strip rate-limit headers from health check responses
        proxy_hide_header X-RateLimit-Limit;
        proxy_hide_header X-RateLimit-Remaining;
    }

    # -------------------------------------------------------------------------
    # Certbot ACME challenge (also useful if cert is renewed while running)
    # -------------------------------------------------------------------------
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
