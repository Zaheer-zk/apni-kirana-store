# =============================================================================
# Catch-all / default server block
#
# Any request that arrives with a Host header not matched by another server
# block (e.g. direct-IP access, scanners, bots) is silently dropped.
# Nginx return code 444 closes the connection without sending a response,
# which wastes the least resources and gives nothing useful to attackers.
# =============================================================================

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    # A valid certificate is required even for the catch-all so nginx can
    # complete the TLS handshake before inspecting the SNI / Host header.
    # Reuse the API certificate — the connection will be dropped immediately
    # anyway, so the cert mismatch is irrelevant.
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # Drop the connection — send no response body, no status line
    return 444;
}
